version: 2
updates:

  # 1. Android & Shared KMP Code (Gradle / Compose Multiplatform)
  - package-ecosystem: "gradle"
    directory: "/" # Adjust if your Gradle project is in a subdirectory (e.g., "/android")
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    # Optional: Group updates together to reduce PR noise
    groups:
      kotlin-dependencies:
        patterns:
          - "org.jetbrains.kotlin*"
          - "org.jetbrains.compose*"
          - "androidx.*"

  # 2. iOS Native Code (Swift Package Manager)
  # Enable this if your iOS project lives in an /iosApp folder and uses SPM
  - package-ecosystem: "swift"
    directory: "/iosApp"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 3

  # 3. CI/CD Workflows (GitHub Actions)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 2
