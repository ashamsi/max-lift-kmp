name: "Branch Naming Convention Validation"

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Check branch naming convention
        shell: bash
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          # Regex matches: feat/, fix/, release/,hotfix/,refactor/,chore/,docs/,dependabot/ followed by text
          REGEX="^(feat|fix|release|hotfix|refactor|chore|docs|dependabot)/.+$"
          
          if [[ ! "$BRANCH_NAME" =~ $REGEX ]]; then
            echo "❌ Error: Branch name '$BRANCH_NAME' does not follow conventions."
            echo "Must start with feat/, fix/, release/,hotfix/,refactor/,chore/,docs/, or dependabot/"
            exit 1
          fi
          echo "✅ Branch name is valid!"
