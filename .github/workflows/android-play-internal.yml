name: Android Play Internal Upload

# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64          - base64-encoded upload keystore (.keystore or .jks)
#   ANDROID_KEYSTORE_PASSWORD        - keystore password
#   ANDROID_KEY_ALIAS                - key alias
#   ANDROID_KEY_PASSWORD             - key password
#   GOOGLE_PLAY_SERVICE_ACCOUNT_JSON - Play Console service account JSON (full file contents)

# Run via "Run workflow" and select a release/* or hotfix/* branch as the ref.
# main is protected (PR-only); releases are cut from a release branch.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      # Needed to push the release tag after a successful upload.
      contents: write
    env:
      JAVA_TOOL_OPTIONS: "-Xmx4g"
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=4"
    steps:
      - name: Verify running from a release branch
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" != "branch" || ! "${{ github.ref_name }}" =~ ^(release|hotfix)/.+$ ]]; then
            echo "::error::This workflow must be run from a release/* or hotfix/* branch (got '${{ github.ref_name }}')."
            exit 1
          fi
          echo "Deploying from branch '${{ github.ref_name }}'."

      - name: Checkout project
        uses: actions/checkout@v4

      - name: Configure git identity for version bump & release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump versionCode and commit
        shell: bash
        env:
          GH_REF_NAME: ${{ github.ref_name }}
        run: |
          GRADLE_FILE="androidApp/build.gradle.kts"
          CURRENT_CODE=$(sed -n 's/.*versionCode = \([0-9][0-9]*\).*/\1/p' "$GRADLE_FILE" | head -n1)
          if [[ -z "$CURRENT_CODE" ]]; then
            echo "::error::Could not read versionCode from $GRADLE_FILE"
            exit 1
          fi
          NEXT_CODE=$((CURRENT_CODE + 1))

          # Anchor the substitution to the versionCode assignment so nothing else matches.
          sed -i.bak "s/versionCode = ${CURRENT_CODE}/versionCode = ${NEXT_CODE}/" "$GRADLE_FILE"
          rm -f "${GRADLE_FILE}.bak"

          # Commit & push the bump *before* building/uploading. Committing first
          # guarantees a versionCode is never reused even if a later step fails
          # (gaps are harmless to Play; collisions are rejected).
          git commit -m "ci: bump Android versionCode to ${NEXT_CODE} [skip ci]" -- "$GRADLE_FILE"
          git push origin "HEAD:${GH_REF_NAME}"
          echo "Android versionCode set to ${NEXT_CODE}."

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode upload keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo -n "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload-keystore.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/upload-keystore.jks" >> "$GITHUB_ENV"

      - name: Build release App Bundle
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :androidApp:bundleRelease --stacktrace

      - name: Upload to Play Internal track
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.arturshamsi.maxlift
          releaseFiles: androidApp/build/outputs/bundle/release/androidApp-release.aab
          track: internal
          status: completed

      - name: Tag successful Play Internal upload
        if: success()
        shell: bash
        env:
          GH_REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION_NAME=$(sed -n 's/.*versionName = "\(.*\)".*/\1/p' androidApp/build.gradle.kts | head -n1)
          VERSION_CODE=$(sed -n 's/.*versionCode = \([0-9][0-9]*\).*/\1/p' androidApp/build.gradle.kts | head -n1)
          TAG="play-internal/v${VERSION_NAME}-${VERSION_CODE}"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::warning::Tag '$TAG' already exists on remote; skipping."
            exit 0
          fi

          git tag -a "$TAG" -m "Play internal upload: v${VERSION_NAME} (versionCode ${VERSION_CODE}) from ${GH_REF_NAME}"
          git push origin "refs/tags/$TAG"
          echo "Created and pushed tag '$TAG'."
